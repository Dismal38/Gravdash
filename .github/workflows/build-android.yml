name: Build Android AAB

# Triggered manually (workflow_dispatch) or on push to main when the Android
# project or frontend source changes.

on:
    workflow_dispatch:
    push:
        branches: [main]
        paths:
            - "frontend/**"
            - ".github/workflows/build-android.yml"

jobs:
    build:
        name: Build signed Android App Bundle
        runs-on: ubuntu-latest
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node 20
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Setup Java 21
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "21"

            - name: Setup Android SDK
              uses: android-actions/setup-android@v3

            - name: Install JS dependencies
              working-directory: frontend
              run: yarn install

            - name: Build React production bundle
              working-directory: frontend
              run: yarn build

            - name: Sync Capacitor → Android
              working-directory: frontend
              run: npx cap sync android

            - name: Decode keystore from secret
              working-directory: frontend/android/app
              run: |
                  # Strip any whitespace/newlines that may have crept in during
                  # mobile copy-paste into GitHub Secrets, then decode.
                  echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 -d > release.keystore
                  # Sanity check — fail loudly if decoded output is empty or tiny
                  SIZE=$(wc -c < release.keystore)
                  echo "Decoded keystore size: $SIZE bytes"
                  if [ "$SIZE" -lt 1000 ]; then
                    echo "::error::Keystore decoded to only $SIZE bytes — KEYSTORE_BASE64 secret is empty or malformed."
                    exit 1
                  fi

            - name: Write signing config
              working-directory: frontend/android
              run: |
                  cat >> app/build.gradle <<'EOF'
                  android {
                      signingConfigs {
                          release {
                              storeFile file('release.keystore')
                              storePassword System.getenv('KEYSTORE_PASSWORD')
                              keyAlias System.getenv('KEY_ALIAS')
                              keyPassword System.getenv('KEY_PASSWORD')
                          }
                      }
                      buildTypes {
                          release {
                              signingConfig signingConfigs.release
                          }
                      }
                  }
                  EOF

            - name: Build release AAB
              working-directory: frontend/android
              env:
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: |
                  chmod +x gradlew
                  ./gradlew bundleRelease --no-daemon --stacktrace

            - name: Locate the AAB
              id: aab
              working-directory: frontend/android
              run: |
                  AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
                  echo "Found: $AAB_PATH"
                  echo "path=$AAB_PATH" >> "$GITHUB_OUTPUT"

            - name: Upload AAB artifact
              uses: actions/upload-artifact@v4
              with:
                  name: gravdash-release-${{ github.run_number }}.aab
                  path: frontend/android/${{ steps.aab.outputs.path }}
                  retention-days: 90
                  if-no-files-found: error

            - name: Clean up keystore
              if: always()
              working-directory: frontend/android/app
              run: rm -f release.keystore
